<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Товары</title>
</head>
<body>
     <div>
        <header class="header">
            <h1 class="h1">Популярные товары </h1>
        <div class="btn_fl">
            <button class="btn"><a href="#!">   🛒    </a></button>
        </div>
        </header>
        
     </div>
     <div class="container_card">
        <main class="container_card">
          <div class="card">
              <img src="./images/air_max.jpg" width="250px" height="250px" class="card_air" alt="">
              <h3 class="many">4.990$<sup> -17%</sup></h3>
              <h4 class="reviews">★★★★☆</h4>
              <p class="text">Удобные, лёгкие, дышащие.</p>
          </div>
          <div class="card">
              <img src="./images/portfel.jpg" width="250px" height="250px" class="card_portfel" alt="">
              <h3 class="many">2.490$<sup> -23%</sup></h3>
              <h4 class="reviews">★★★★★</h4>
              <p class="text">Водонепроницаемый портфель 20л.</p>
          </div>
           <div class="card">
            <img src="./images/pro.jpg" width="250px" height="250px" class="card_pro" alt="">
             <h3 class="many">3.490$<sup> -5%</sup></h3>
              <h4 class="reviews">★★★☆☆</h4>
              <p class="text">Шумоподавление, 20 часов работы.</p>
           </div>
          <div class="card">
            <img src="./images/watch.jpg" width="250px" height="250px" class="card_watch" alt="">
            <h3 class="many">5.490$<sup> -7%</sup></h3>
              <h4 class="reviews">★★★★★</h4>
              <p class="text">Фитнес-трекер, GPS, AMOLED.</p>
          </div>
        </main>
    </div>
</body>
</html>
